<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aaro Lehtoranta</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    p {
      margin-bottom: 24px;
      color: #555;
    }

    .links a {
      display: block;
      margin: 12px 0;
      padding: 14px 18px;
      background: #111;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .links a:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Aaro Lehtoranta</h1>
    <p>Business student interested in finance, systems, and practical problem solving.</p>

    <div class="links">
      <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a>
      <a href="https://www.instagram.com/" target="_blank">Instagram</a>
      <a href="cv.pdf" target="_blank">CV</a>
    </div>
  </div>
</body>
</html>
